name: go

on:
  push:
    branches: ['*']
    tags: ['v*']
  pull_request:
    branches: ['*']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25.0', '1.26.3']
        dir: ['pkg', 'cmd/zstdseek']
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: dcarbone/install-jq-action@4fcb5062d7ce9bc4382d1a352d19ba3ba2c317c1 # v4.0.1
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: ${{ matrix.dir }}/go.sum
      - name: Display Go version
        run: go version
      - name: Install dependencies (${{ matrix.dir }})
        working-directory: ./${{ matrix.dir }}
        run: |
          go get .
      - name: Build (${{ matrix.dir }})
        working-directory: ./${{ matrix.dir }}
        run: |
          for OSARCH in $(go tool dist list -json | jq -r '.[] | select(.FirstClass) | [.GOOS , .GOARCH] | join("/")'); do
            IFS="/" read -r OS ARCH <<< "$OSARCH"
            echo "Building for $OS $ARCH"
            GOOS=$OS GOARCH=$ARCH go build ./...
          done
      - name: Test (${{ matrix.dir }})
        working-directory: ./${{ matrix.dir }}
        run: go test -race -v ./...
