name: golangci-lint
on:
  push:
    branches: ['*']
    tags: ['v*']
  pull_request:
    branches: ['*']

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          check-latest: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: latest
          working-directory: ./pkg
